name: Furent CI/CD → Railway

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Esto activa el botón manual que no te salía

env:
  JAVA_VERSION: '17'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Build con Maven
        run: ./mvnw clean compile -B -q

      - name: Ejecutar Tests
        run: ./mvnw test -B
        env:
          SPRING_PROFILES_ACTIVE: dev
          MONGODB_URI: mongodb://localhost:27017/furent_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Package JAR
        run: ./mvnw package -DskipTests -B -q

      - name: Subir JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: furent-jar
          path: target/*.jar
          retention-days: 5

  deploy:
    name: Deploy a Railway
    runs-on: ubuntu-latest
    needs: [ build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy a Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}