<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-surface-50 font-sans text-surface-800 min-h-screen flex flex-col">

    <div th:replace="~{fragments/layout :: nav}"></div>

    <main class="flex-1 pt-[68px]">

        <div class="min-h-[calc(100vh-68px)] flex items-center justify-center px-4 py-12">
            <div class="w-full max-w-md fade-in-up">
                <div class="bg-white rounded-2xl p-8 shadow-card border border-surface-100">
                    <!-- Header -->
                    <div class="text-center mb-8">
                        <div class="w-14 h-14 rounded-xl flex items-center justify-center mx-auto mb-4 overflow-hidden">
                            <img th:src="@{/images/furent-logo.png}" alt="Furent Logo" class="w-14 h-14 object-cover">
                        </div>
                        <h1 class="text-2xl font-bold text-surface-900 mb-1">Crear cuenta</h1>
                        <p class="text-sm text-surface-500">Regístrate para comenzar a reservar</p>
                    </div>

                    <!-- Messages -->
                    <div th:if="${error}" class="p-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm mb-4" th:text="${error}"></div>

                    <!-- Form -->
                    <form id="registerForm" th:action="@{/registro}" method="post" class="space-y-4" novalidate>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Nombre</label>
                                <input type="text" name="nombre" id="regNombre" placeholder="Juan" required class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Apellido</label>
                                <input type="text" name="apellido" id="regApellido" placeholder="Pérez" required class="w-full px-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Email</label>
                            <div class="relative">
                                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-[18px] h-[18px] text-surface-400" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
                                <input type="email" name="email" id="regEmail" placeholder="tu@gmail.com" required class="w-full pl-11 pr-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                            </div>
                            <p id="emailError" class="text-xs text-red-600 font-medium mt-1.5 hidden"></p>
                            <p class="text-[11px] text-surface-400 mt-1.5">Solo Gmail, Outlook y Hotmail</p>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Teléfono</label>
                            <div class="relative">
                                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-[18px] h-[18px] text-surface-400" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
                                <input type="tel" name="telefono" id="regTelefono" placeholder="+57 300 000 0000" class="w-full pl-11 pr-4 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-surface-600 uppercase tracking-wider mb-2">Contraseña</label>
                            <div class="relative">
                                <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-[18px] h-[18px] text-surface-400" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
                                <input id="regPass" type="password" name="password" placeholder="Mínimo 8 caracteres" required class="w-full pl-11 pr-11 py-3 bg-surface-50 border border-surface-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-furent-500/30 focus:border-furent-500 input-glow transition-all">
                                <button type="button" onclick="togglePass('regPass',this)" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-surface-400 hover:text-surface-600 transition-colors" tabindex="-1">
                                    <svg class="eye-open w-[18px] h-[18px]" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    <svg class="eye-closed w-[18px] h-[18px] hidden" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/></svg>
                                </button>
                            </div>
                            <!-- Password strength indicator -->
                            <div id="passStrengthBox" class="mt-2.5 hidden">
                                <div class="flex gap-1 mb-1.5">
                                    <div id="bar1" class="h-1 flex-1 rounded-full bg-surface-200 transition-colors duration-300"></div>
                                    <div id="bar2" class="h-1 flex-1 rounded-full bg-surface-200 transition-colors duration-300"></div>
                                    <div id="bar3" class="h-1 flex-1 rounded-full bg-surface-200 transition-colors duration-300"></div>
                                    <div id="bar4" class="h-1 flex-1 rounded-full bg-surface-200 transition-colors duration-300"></div>
                                </div>
                                <p id="passStrengthText" class="text-[11px] font-semibold text-surface-400 transition-colors"></p>
                                <ul class="mt-2 space-y-1">
                                    <li id="rule-length" class="flex items-center gap-1.5 text-[11px] text-surface-400">
                                        <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                        Mínimo 8 caracteres
                                    </li>
                                    <li id="rule-upper" class="flex items-center gap-1.5 text-[11px] text-surface-400">
                                        <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                        Una letra mayúscula
                                    </li>
                                    <li id="rule-lower" class="flex items-center gap-1.5 text-[11px] text-surface-400">
                                        <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                        Una letra minúscula
                                    </li>
                                    <li id="rule-number" class="flex items-center gap-1.5 text-[11px] text-surface-400">
                                        <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                        Un número
                                    </li>
                                    <li id="rule-special" class="flex items-center gap-1.5 text-[11px] text-surface-400">
                                        <svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                        Un carácter especial (@#$!...)
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <label class="flex items-start gap-2.5 cursor-pointer pt-1">
                            <input type="checkbox" id="termsCheck" class="w-4 h-4 rounded border-surface-300 text-furent-500 focus:ring-furent-500 mt-0.5">
                            <span class="text-xs text-surface-500 leading-relaxed">Acepto los <a href="#" onclick="event.preventDefault(); openTermsDialog('terminos')" class="text-furent-500 hover:underline">términos de servicio</a> y la <a href="#" onclick="event.preventDefault(); openTermsDialog('privacidad')" class="text-furent-500 hover:underline">política de privacidad</a></span>
                        </label>
                        <button type="submit" id="registerBtn" class="w-full py-3 bg-surface-900 text-white font-semibold rounded-xl hover:bg-surface-800 transition-colors mt-2">
                            Crear cuenta
                        </button>
                    </form>

                    <!-- Login link -->
                    <p class="text-center text-sm text-surface-500 mt-6">
                        ¿Ya tienes cuenta?
                        <a th:href="@{/login}" class="text-furent-500 hover:text-furent-600 font-medium transition-colors">Iniciar sesión</a>
                    </p>
                </div>
            </div>
        </div>

    </main>

    <!-- ================================== -->
    <!-- TERMS & CONDITIONS DIALOG          -->
    <!-- ================================== -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
    <el-dialog>
      <dialog id="termsDialog" aria-labelledby="termsDialog-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent focus:outline-none">
        <el-dialog-backdrop class="fixed inset-0 bg-surface-950/40 backdrop-blur-sm transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in"></el-dialog-backdrop>
        <div tabindex="0" class="flex min-h-full items-center justify-center p-4 focus:outline-none">
          <el-dialog-panel class="relative transform overflow-hidden rounded-2xl bg-white text-left shadow-2xl border border-surface-100 transition-all data-closed:translate-y-4 data-closed:opacity-0 data-closed:sm:translate-y-0 data-closed:sm:scale-95 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:w-full sm:max-w-2xl">
            <!-- Header -->
            <div class="flex items-center justify-between border-b border-surface-200 px-6 py-4">
              <h3 id="termsDialog-title" class="text-lg font-bold text-surface-900"></h3>
              <button type="button" onclick="closeTermsDialog()" class="w-8 h-8 rounded-lg text-surface-400 hover:text-surface-900 hover:bg-surface-100 flex items-center justify-center transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            <!-- Body -->
            <div id="termsDialog-body" class="px-6 py-5 max-h-[60vh] overflow-y-auto space-y-4 text-sm text-surface-600 leading-relaxed">
            </div>
            <!-- Footer -->
            <div class="flex items-center border-t border-surface-200 px-6 py-4 gap-3">
              <button type="button" onclick="acceptTerms()" class="px-5 py-2.5 bg-furent-500 text-white font-bold text-xs rounded-xl hover:bg-furent-600 transition-colors shadow-sm">Acepto</button>
              <button type="button" onclick="closeTermsDialog()" class="px-5 py-2.5 bg-white border border-surface-200 text-surface-700 font-bold text-xs rounded-xl hover:bg-surface-50 transition-colors">Rechazar</button>
            </div>
          </el-dialog-panel>
        </div>
      </dialog>
    </el-dialog>

    <style>
        dialog[open] { animation: dialogShow 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        dialog.closing { animation: dialogHide 0.2s cubic-bezier(0.7, 0, 0.84, 0) forwards; }
        @keyframes dialogShow { from { opacity: 0; } to { opacity: 1; } }
        @keyframes dialogHide { from { opacity: 1; } to { opacity: 0; } }
    </style>

    <script th:src="@{/js/app.js}"></script>
    <script>
    // ============================
    // PASSWORD TOGGLE
    // ============================
    function togglePass(inputId, btn) {
        const input = document.getElementById(inputId);
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.querySelector('.eye-open').classList.toggle('hidden', !isPassword);
        btn.querySelector('.eye-closed').classList.toggle('hidden', isPassword);
    }

    // ============================
    // EMAIL DOMAIN VALIDATION
    // ============================
    const ALLOWED_DOMAINS = ['gmail.com', 'outlook.com', 'outlook.es', 'hotmail.com', 'hotmail.es', 'live.com'];

    function validateEmailDomain(email) {
        if (!email) return { valid: false, error: 'El email es obligatorio' };
        const parts = email.split('@');
        if (parts.length !== 2 || !parts[1]) return { valid: false, error: 'Formato de email inválido' };
        const domain = parts[1].toLowerCase();
        if (!ALLOWED_DOMAINS.includes(domain)) {
            return { valid: false, error: 'Solo aceptamos correos de Gmail, Outlook o Hotmail' };
        }
        return { valid: true, error: null };
    }

    const emailInput = document.getElementById('regEmail');
    const emailError = document.getElementById('emailError');

    emailInput.addEventListener('blur', function() {
        const result = validateEmailDomain(this.value.trim());
        if (!result.valid && this.value.trim().length > 0) {
            emailError.textContent = result.error;
            emailError.classList.remove('hidden');
            this.classList.add('border-red-400', 'focus:ring-red-500/30', 'focus:border-red-500');
            this.classList.remove('border-surface-200', 'focus:ring-furent-500/30', 'focus:border-furent-500');
        } else {
            emailError.classList.add('hidden');
            this.classList.remove('border-red-400', 'focus:ring-red-500/30', 'focus:border-red-500');
            this.classList.add('border-surface-200', 'focus:ring-furent-500/30', 'focus:border-furent-500');
        }
    });

    // ============================
    // PASSWORD STRENGTH CHECKER
    // ============================
    const passInput = document.getElementById('regPass');
    const strengthBox = document.getElementById('passStrengthBox');
    const strengthText = document.getElementById('passStrengthText');
    const bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];

    const rules = {
        length:  { el: document.getElementById('rule-length'),  test: p => p.length >= 8 },
        upper:   { el: document.getElementById('rule-upper'),   test: p => /[A-Z]/.test(p) },
        lower:   { el: document.getElementById('rule-lower'),   test: p => /[a-z]/.test(p) },
        number:  { el: document.getElementById('rule-number'),  test: p => /[0-9]/.test(p) },
        special: { el: document.getElementById('rule-special'), test: p => /[^A-Za-z0-9]/.test(p) }
    };

    function evaluatePasswordStrength(password) {
        let score = 0;
        const results = {};
        for (const [key, rule] of Object.entries(rules)) {
            results[key] = rule.test(password);
            if (results[key]) score++;
        }
        return { score, results };
    }

    function updateStrengthUI(password) {
        if (!password) {
            strengthBox.classList.add('hidden');
            return;
        }
        strengthBox.classList.remove('hidden');

        const { score, results } = evaluatePasswordStrength(password);

        // Update rule indicators
        for (const [key, passed] of Object.entries(results)) {
            const el = rules[key].el;
            if (passed) {
                el.classList.remove('text-surface-400');
                el.classList.add('text-green-600');
            } else {
                el.classList.remove('text-green-600');
                el.classList.add('text-surface-400');
            }
        }

        // Update bars + label
        const colors = ['bg-surface-200', 'bg-red-500', 'bg-amber-500', 'bg-blue-500', 'bg-green-500'];
        const labels = ['', 'Muy débil', 'Débil', 'Buena', 'Excelente'];
        const textColors = ['', 'text-red-600', 'text-amber-600', 'text-blue-600', 'text-green-600'];

        // Clamp score to max 4 for bars (we have 5 rules but 4 bars)
        const level = score <= 1 ? 1 : score <= 2 ? 2 : score <= 3 ? 3 : 4;

        bars.forEach((bar, i) => {
            bar.className = 'h-1 flex-1 rounded-full transition-colors duration-300 ';
            bar.classList.add(i < level ? colors[level] : 'bg-surface-200');
        });

        strengthText.textContent = labels[level];
        strengthText.className = 'text-[11px] font-semibold transition-colors ' + textColors[level];
    }

    passInput.addEventListener('input', function() {
        updateStrengthUI(this.value);
    });

    // ============================
    // TERMS & CONDITIONS CONTENT
    // ============================
    const termsContent = {
        terminos: {
            title: 'Términos y Condiciones de Servicio',
            body: `
                <h4 class="font-bold text-surface-900 text-base">1. Aceptación de los Términos</h4>
                <p>Al crear una cuenta en Furent y utilizar nuestros servicios de alquiler de mobiliario para eventos, usted acepta cumplir y estar sujeto a los presentes Términos y Condiciones. Si no está de acuerdo con alguna parte de estos términos, no podrá acceder ni utilizar nuestros servicios.</p>

                <h4 class="font-bold text-surface-900 text-base">2. Descripción del Servicio</h4>
                <p>Furent es una plataforma digital de alquiler de mobiliario y equipamiento para eventos que permite a los usuarios cotizar, reservar y gestionar el préstamo temporal de sillas, mesas, carpas, decoraciones y otros artículos relacionados. El servicio incluye la entrega, instalación (cuando aplique) y retiro del mobiliario en las fechas acordadas.</p>

                <h4 class="font-bold text-surface-900 text-base">3. Registro y Cuenta de Usuario</h4>
                <p>Para utilizar los servicios de Furent, el usuario debe crear una cuenta proporcionando información veraz, precisa y actualizada. El usuario es responsable de mantener la confidencialidad de sus credenciales de acceso y de todas las actividades realizadas bajo su cuenta. Furent se reserva el derecho de suspender o cancelar cuentas que proporcionen información falsa o que violen estos términos.</p>

                <h4 class="font-bold text-surface-900 text-base">4. Reservas y Pagos</h4>
                <p>Las reservas están sujetas a disponibilidad del inventario. Una vez confirmada la reserva, el usuario se compromete a realizar el pago en los plazos establecidos. Los precios publicados incluyen el uso del mobiliario durante el período acordado. Los costos adicionales por transporte, instalación o períodos extendidos serán comunicados previamente al usuario.</p>
                <ul class="list-disc pl-5 space-y-1">
                    <li>Las reservas requieren un pago anticipado o confirmación de pago en efectivo dentro de las 48 horas.</li>
                    <li>Los cambios en las reservas deben solicitarse con al menos 72 horas de anticipación.</li>
                    <li>Una vez entregado el mobiliario, el cliente es responsable del cuidado y custodia del mismo.</li>
                </ul>

                <h4 class="font-bold text-surface-900 text-base">5. Cancelaciones y Reembolsos</h4>
                <p>Las cancelaciones realizadas con más de 5 días de anticipación al evento serán elegibles para un reembolso completo. Las cancelaciones entre 3 y 5 días tendrán un cargo del 30% del total. Las cancelaciones con menos de 72 horas o la no recepción del mobiliario no serán elegibles para reembolso alguno.</p>

                <h4 class="font-bold text-surface-900 text-base">6. Responsabilidad del Usuario</h4>
                <p>El usuario se responsabiliza del buen uso y conservación del mobiliario alquilado. Cualquier daño, pérdida o deterioro más allá del desgaste normal será facturado al usuario según el valor de reposición o reparación del artículo afectado. El usuario acepta proporcionar una dirección válida para la entrega y retiro del mobiliario.</p>

                <h4 class="font-bold text-surface-900 text-base">7. Conducta Prohibida</h4>
                <ul class="list-disc pl-5 space-y-1">
                    <li>Subalquilar el mobiliario a terceros sin autorización escrita de Furent.</li>
                    <li>Utilizar el mobiliario para fines ilegales o que puedan causar daño.</li>
                    <li>Proporcionar información falsa durante el proceso de registro o reserva.</li>
                    <li>Intentar acceder de forma no autorizada a sistemas o datos de la plataforma.</li>
                </ul>

                <h4 class="font-bold text-surface-900 text-base">8. Limitación de Responsabilidad</h4>
                <p>Furent no será responsable por daños indirectos, incidentales o consecuentes derivados del uso o la imposibilidad de uso de nuestros servicios. Nuestra responsabilidad total se limitará al monto pagado por el servicio específico que originó la reclamación.</p>

                <h4 class="font-bold text-surface-900 text-base">9. Modificaciones</h4>
                <p>Furent se reserva el derecho de modificar estos Términos y Condiciones en cualquier momento. Los cambios entrarán en vigor al publicarse en la plataforma. El uso continuado del servicio tras la publicación de cambios constituirá la aceptación de los mismos.</p>

                <h4 class="font-bold text-surface-900 text-base">10. Ley Aplicable</h4>
                <p>Los presentes Términos y Condiciones se rigen por la legislación colombiana vigente. Cualquier controversia será resuelta ante los tribunales competentes de la jurisdicción correspondiente.</p>

                <p class="text-xs text-surface-400 italic mt-4 pt-3 border-t border-surface-100">Última actualización: Marzo 2026. Al utilizar nuestros servicios, usted confirma haber leído y aceptado estos Términos y Condiciones en su totalidad.</p>
            `
        },
        privacidad: {
            title: 'Política de Privacidad',
            body: `
                <h4 class="font-bold text-surface-900 text-base">1. Información que Recopilamos</h4>
                <p>Al registrarse en Furent, recopilamos la siguiente información personal: nombre completo, dirección de correo electrónico, número de teléfono y, al realizar reservas, dirección de entrega del evento. Esta información es necesaria para la prestación de nuestros servicios de alquiler de mobiliario.</p>

                <h4 class="font-bold text-surface-900 text-base">2. Uso de la Información</h4>
                <p>Utilizamos su información personal exclusivamente para:</p>
                <ul class="list-disc pl-5 space-y-1">
                    <li>Gestionar su cuenta y autenticación en la plataforma.</li>
                    <li>Procesar y coordinar las reservas y entregas de mobiliario.</li>
                    <li>Comunicarnos con usted sobre el estado de sus pedidos.</li>
                    <li>Enviar notificaciones relevantes sobre el servicio.</li>
                    <li>Mejorar la experiencia del usuario en nuestra plataforma.</li>
                </ul>

                <h4 class="font-bold text-surface-900 text-base">3. Protección de Datos</h4>
                <p>Implementamos medidas de seguridad técnicas y organizativas apropiadas para proteger su información personal contra acceso no autorizado, alteración, divulgación o destrucción. Las contraseñas se almacenan cifradas mediante algoritmos de hash seguros y nunca son accesibles en texto plano.</p>

                <h4 class="font-bold text-surface-900 text-base">4. Compartición con Terceros</h4>
                <p>No vendemos, intercambiamos ni transferimos su información personal a terceros, excepto cuando sea necesario para completar una transacción (como compartir la dirección de entrega con nuestro equipo de logística) o cuando sea requerido por ley.</p>

                <h4 class="font-bold text-surface-900 text-base">5. Cookies y Tecnologías de Seguimiento</h4>
                <p>Nuestra plataforma utiliza cookies de sesión para mantener su autenticación activa. Estas cookies son estrictamente necesarias para el funcionamiento del servicio y no se utilizan para rastreo publicitario.</p>

                <h4 class="font-bold text-surface-900 text-base">6. Derechos del Usuario</h4>
                <p>De conformidad con la Ley 1581 de 2012 (Ley de Protección de Datos Personales de Colombia), usted tiene derecho a:</p>
                <ul class="list-disc pl-5 space-y-1">
                    <li>Conocer, actualizar y rectificar sus datos personales.</li>
                    <li>Solicitar la eliminación de sus datos cuando considere que no están siendo tratados conforme a la ley.</li>
                    <li>Revocar la autorización del tratamiento de sus datos.</li>
                    <li>Acceder de forma gratuita a sus datos personales.</li>
                </ul>

                <h4 class="font-bold text-surface-900 text-base">7. Retención de Datos</h4>
                <p>Conservamos su información personal mientras su cuenta esté activa o según sea necesario para proporcionarle nuestros servicios. Si solicita la eliminación de su cuenta, procederemos a eliminar su información personal de nuestros sistemas en un plazo razonable, salvo que exista una obligación legal de conservarla.</p>

                <h4 class="font-bold text-surface-900 text-base">8. Contacto</h4>
                <p>Para cualquier consulta, solicitud o reclamo relacionado con el tratamiento de sus datos personales, puede comunicarse con nosotros a través de los canales de contacto disponibles en nuestra plataforma.</p>

                <p class="text-xs text-surface-400 italic mt-4 pt-3 border-t border-surface-100">Última actualización: Marzo 2026. Esta Política de Privacidad se rige por la Ley 1581 de 2012 y sus decretos reglamentarios.</p>
            `
        }
    };

    // ============================
    // DIALOG MANAGEMENT
    // ============================
    function openTermsDialog(type) {
        const content = termsContent[type];
        if (!content) return;
        document.getElementById('termsDialog-title').textContent = content.title;
        document.getElementById('termsDialog-body').innerHTML = content.body;
        document.getElementById('termsDialog').showModal();
    }

    function closeTermsDialog() {
        const dialog = document.getElementById('termsDialog');
        dialog.classList.add('closing');
        setTimeout(() => { dialog.close(); dialog.classList.remove('closing'); }, 200);
    }

    function acceptTerms() {
        document.getElementById('termsCheck').checked = true;
        closeTermsDialog();
    }

    // ============================
    // FORM SUBMISSION VALIDATION
    // ============================
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const nombre = document.getElementById('regNombre').value.trim();
        const apellido = document.getElementById('regApellido').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPass').value;
        const termsChecked = document.getElementById('termsCheck').checked;

        // Field presence
        if (!nombre || !apellido) {
            showValidationError('Por favor completa tu nombre y apellido');
            return;
        }

        // Email domain
        const emailResult = validateEmailDomain(email);
        if (!emailResult.valid) {
            emailError.textContent = emailResult.error;
            emailError.classList.remove('hidden');
            emailInput.focus();
            return;
        }

        // Password strength
        const { score } = evaluatePasswordStrength(password);
        if (score < 3) {
            showValidationError('La contraseña debe cumplir al menos 3 requisitos de seguridad: 8 caracteres mínimo, mayúscula, minúscula, número y carácter especial.');
            passInput.focus();
            return;
        }

        // Terms
        if (!termsChecked) {
            openTermsDialog('terminos');
            return;
        }

        // All valid — submit
        this.submit();
    });

    function showValidationError(msg) {
        const existing = document.getElementById('validationMsg');
        if (existing) existing.remove();
        const form = document.getElementById('registerForm');
        const div = document.createElement('div');
        div.id = 'validationMsg';
        div.className = 'p-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm mb-4 flex items-center gap-2';
        div.innerHTML = '<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008z"/></svg>' + msg;
        form.insertBefore(div, form.firstChild);
        div.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => { if (div.parentNode) div.remove(); }, 6000);
    }
    </script>
