<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-surface-50 font-sans text-surface-800 min-h-screen flex flex-col">

    <div th:replace="~{fragments/layout :: nav}"></div>

    <main class="flex-1 flex items-center justify-center pt-[68px]">
        <div class="max-w-lg w-full px-4 py-12">
            <div class="bg-white rounded-[2rem] shadow-2xl border border-surface-100 p-8 sm:p-12 text-center relative overflow-hidden">
                <!-- Decorative background -->
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-furent-400 via-furent-600 to-furent-400"></div>
                
                <div class="mb-8 relative inline-block">
                    <!-- Premium Animated Loader -->
                    <div class="w-24 h-24 rounded-full border-4 border-surface-100 border-t-furent-600 animate-spin"></div>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <svg class="w-10 h-10 text-furent-600 opacity-50" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
                        </svg>
                    </div>
                </div>

                <h1 class="text-2xl sm:text-3xl font-bold text-surface-900 mb-3 tracking-tight">Cifrando conexión segura</h1>
                <p class="text-surface-500 mb-8 leading-relaxed">
                    Estamos conectando con la pasarela oficial de <span class="font-bold text-surface-900">PayU Latam</span> para procesar tu pago de forma segura.
                </p>

                <div class="bg-surface-50 rounded-2xl p-6 mb-8 border border-surface-100">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-sm text-surface-400 uppercase tracking-widest font-semibold">Monto a pagar</span>
                        <span class="text-xs px-2 py-0.5 bg-green-100 text-green-700 rounded-full font-bold">Seguro</span>
                    </div>
                    <div class="text-3xl font-extrabold text-surface-900" id="amount-display" th:text="'$' + ${#numbers.formatDecimal(total != null ? total : 0, 1, 'POINT', 0, 'COMMA')}">$0</div>
                </div>

                <div id="redirect-message" class="flex flex-col items-center gap-3">
                    <p class="text-sm font-medium text-furent-600 animate-pulse">Redirigiendo en unos segundos...</p>
                    <div class="flex gap-1.5">
                        <span class="w-1.5 h-1.5 bg-furent-500 rounded-full animate-bounce" style="animation-delay: 0s"></span>
                        <span class="w-1.5 h-1.5 bg-furent-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
                        <span class="w-1.5 h-1.5 bg-furent-500 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
                    </div>
                </div>

                <form id="payu-form" th:action="${payuUrl}" method="post" class="hidden">
                    <input name="merchantId"    type="hidden" th:value="${payuMerchantId}">
                    <input name="accountId"     type="hidden" th:value="${payuAccountId}">
                    <input name="description"   type="hidden" th:value="'Alquiler de Mobiliario Furent - Ref: ' + ${payuReferenceCode}">
                    <input name="referenceCode" type="hidden" th:value="${payuReferenceCode}">
                    <input name="amount"        type="hidden" th:value="${payuAmount}">
                    <input name="tax"           type="hidden" value="0">
                    <input name="taxReturnBase" type="hidden" value="0">
                    <input name="currency"      type="hidden" th:value="${payuCurrency}">
                    <input name="signature"     type="hidden" th:value="${payuSignature}">
                    <input name="test"          type="hidden" th:value="${payuTest}">
                    <input name="buyerEmail"    type="hidden" th:value="${payuBuyerEmail}">
                    <input name="buyerFullName" type="hidden" th:value="${payuBuyerFullName}">
                    <input name="responseUrl"    type="hidden" th:value="${payuResponseUrl}">
                    <input name="confirmationUrl" type="hidden" th:value="${payuConfirmationUrl}">
                </form>

                <p class="text-xs text-surface-400 mt-10">
                    No cierres esta ventana ni recargues la página mientras establecemos la conexión.
                </p>
            </div>
            
            <div class="mt-8 flex items-center justify-center gap-6 opacity-40 grayscale hover:grayscale-0 transition-all duration-700">
                <img src="https://www.payulatam.com/wp-content/uploads/2019/04/logo-payu.png" alt="PayU" class="h-6">
                <div class="w-px h-4 bg-surface-300"></div>
                <div class="flex gap-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/2560px-Visa_Inc._logo.svg.png" alt="Visa" class="h-4">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/1280px-Mastercard-logo.svg.png" alt="Mastercard" class="h-4">
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <script th:inline="javascript">
        (function() {
            const form = document.getElementById('payu-form');
            if (form) {
                setTimeout(() => {
                    form.submit();
                }, 2500);
            }
        })();
    </script>
</body>
</html>
